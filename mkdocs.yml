site_name: geniusDebug
site_description: A minimal, self-hosted Sentry alternative for frontend error monitoring.
site_url: https://xgeniousllc.github.io/geniusDebug/
repo_url: https://github.com/XgeniousLLC/geniusDebug
repo_name: XgeniousLLC/geniusDebug
edit_uri: edit/main/docs/
copyright: Built by Xgenious · reuses @sentry/nextjs (MIT)

docs_dir: docs

# Emit flat page.html URLs instead of directory-style page/ URLs. Makes every
# internal link resolve under a plain static host (incl. GitHub Pages' Jekyll
# branch-deploy), not only the GitHub Actions deploy.
use_directory_urls: false

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  # Renders :material-*: / :fontawesome-*: icon shortcodes (used in the Home cards).
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Pages under docs/ that are reference material, not part of the reading order.
not_in_nav: |
  /dev-prompts.md

validation:
  nav:
    omitted_files: info
  links:
    unrecognized_links: warn

nav:
  - Home: index.md
  - Get started:
      - End-to-end deployment guide: deployment-guide.md
      - Self-host with Docker: self-hosting-docker.md
  - Deploy & configure:
      - Deploy without Docker: deploy.md
      - Configuration: configuration.md
  - Integrate:
      - Integrate an app: integration.md
  - Concepts:
      - Architecture: architecture.md
  - Reference:
      - Requirements spec (SRS): geniusDebug-SRS.md
      - Frontend design brief: frontend-design-brief.md
