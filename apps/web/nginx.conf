# geniusDebug dashboard — static SPA + /api reverse proxy.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip static assets
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Dashboard API — strip the /api prefix (api sets no global prefix).
  # "api" and 4002 resolve on the compose network.
  location /api/ {
    proxy_pass http://api:4002/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Long-cache fingerprinted assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — every other path serves index.html for client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
